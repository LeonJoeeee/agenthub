name: agenthub
description: "Mobile client for self-hosted agents — talks directly to the agent's own gateway plugin."
publish_to: 'none'
version: 0.4.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP
  dio: ^5.7.0

  # Local storage
  shared_preferences: ^2.3.4

  # UI
  flutter_markdown: ^0.7.7
  cupertino_icons: ^1.0.8

  # Utils
  uuid: ^4.5.1
  intl: ^0.20.2
  mobile_scanner: ^6.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
